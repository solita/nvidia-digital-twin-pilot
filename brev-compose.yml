# brev-compose.yml — All-in-one compose for Brev instance (Phases 1–3)
#
# Services:
#   discovery-server  — FastDDS discovery server for ROS 2
#   isaac-sim         — Isaac Sim headless with ROS 2 bridge
#   vehicle-controller — Forklift controller ROS 2 node(s)
#   warehouse-manager  — FastAPI + ROS 2 warehouse manager (Phase 2)
#   redis             — Redis for hot state and pub/sub
#
# Usage:
#   docker compose -f brev-compose.yml up --build -d
#   docker compose -f brev-compose.yml logs -f

services:
  # --- FastDDS Discovery Server ---
  discovery-server:
    image: ros:jazzy
    network_mode: host
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        fast-discovery-server -i 0 -p 11811
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q 2E23 /proc/net/udp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Volume permission init (named volumes are created as root) ---
  isaac-sim-init:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    entrypoint: ["bash", "-c"]
    command:
      - |
        chown -R 1234:1234 /isaac-sim/.nvidia-omniverse/logs \
                            /isaac-sim/.local/share/ov/data \
                            /isaac-sim/.nvidia-omniverse/config \
                            /isaac-sim/kit/cache
    user: "0:0"
    volumes:
      - isaac-sim-cache:/isaac-sim/kit/cache
      - isaac-sim-logs:/isaac-sim/.nvidia-omniverse/logs
      - isaac-sim-data:/isaac-sim/.local/share/ov/data
      - isaac-sim-config:/isaac-sim/.nvidia-omniverse/config

  # --- Isaac Sim ---
  isaac-sim:
    image: nvcr.io/nvidia/isaac-sim:5.1.0
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - ISAACSIM_HOST=${ISAACSIM_HOST:-127.0.0.1}
      - ISAACSIM_SIGNAL_PORT=${ISAACSIM_SIGNAL_PORT:-49100}
      - ISAACSIM_STREAM_PORT=${ISAACSIM_STREAM_PORT:-47998}
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_no_shm.xml
      - SCENE_USD=/sim-scripts/scenes/scene_assembly.usd
    volumes:
      - ./fastdds_no_shm.xml:/fastdds_no_shm.xml:ro
      - ./sim-scripts:/sim-scripts
      - ./simulations/forklift-warehouse/01_scenes:/sim-scripts/scenes
      - ./simulations/forklift-warehouse/02_core_scripts:/sim-scripts/core_scripts:ro
      - isaac-sim-cache:/isaac-sim/kit/cache
      - isaac-sim-logs:/isaac-sim/.nvidia-omniverse/logs
      - isaac-sim-data:/isaac-sim/.local/share/ov/data
      - isaac-sim-config:/isaac-sim/.nvidia-omniverse/config
    command: --exec "/sim-scripts/warehouse_scene_streaming.py"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/isaac-sim-ready"]
      interval: 15s
      timeout: 5s
      start_period: 300s
      retries: 10
    depends_on:
      isaac-sim-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # --- WebRTC Web Viewer (serves the browser client on port 8210) ---
  web-viewer:
    build:
      context: ./web-viewer
      network: host
      args:
        ISAACSIM_HOST: ${ISAACSIM_HOST:-127.0.0.1}
        ISAACSIM_SIGNAL_PORT: ${ISAACSIM_SIGNAL_PORT:-49100}
        ISAACSIM_STREAM_PORT: ${ISAACSIM_STREAM_PORT:-47998}
    network_mode: host
    command: ["npx", "vite", "preview", "--host", "--port", "${WEB_VIEWER_PORT:-8210}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_VIEWER_PORT:-8210}/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      isaac-sim:
        condition: service_healthy
    restart: unless-stopped

  # --- Vehicle Controller ---
  vehicle-controller:
    build:
      context: .
      dockerfile: vehicle-controller/Dockerfile
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_no_shm.xml
      - NUM_FORKLIFTS=1
    volumes:
      - ./fastdds_no_shm.xml:/fastdds_no_shm.xml:ro
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch vehicle_controller multi_forklift.launch.py
      "
    restart: unless-stopped

  # --- Warehouse Manager (Phase 2) ---
  warehouse-manager:
    build:
      context: .
      dockerfile: warehouse-manager/Dockerfile
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastdds_no_shm.xml
      - REDIS_URL=redis://localhost:6379
    volumes:
      - ./fastdds_no_shm.xml:/fastdds_no_shm.xml:ro
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  isaac-sim-cache:
  isaac-sim-logs:
  isaac-sim-data:
  isaac-sim-config:
